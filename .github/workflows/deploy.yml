name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit
    
    - name: Security scan with bandit
      run: bandit -r backend/ -f json -o bandit-report.json || true
    
    - name: Build and push (if using Docker)
      run: |
        echo "Deploy step - configure for your platform:"
        echo "- Heroku: heroku login && git push heroku main"
        echo "- AWS: aws deploy push --application-name $APP_NAME --s3-location s3://$BUCKET/app.zip --source ."
        echo "- Azure: az webapp deployment source config-zip --resource-group $RG --name $APP --src-path app.zip"
