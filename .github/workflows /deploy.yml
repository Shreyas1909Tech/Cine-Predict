name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov black isort

      # ✅ Linting (fails only on critical errors)
      - name: Lint with flake8
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --max-complexity=10 --max-line-length=127 --statistics

      # ✅ Formatting check (won't break build)
      - name: Check formatting with black
        run: black --check backend/ || echo "Black formatting issues found"

      - name: Check import sorting with isort
        run: isort --check-only backend/ || echo "Import sorting issues found"

      # ✅ Run tests safely (won’t crash if folder missing)
      - name: Run tests with pytest
        run: |
          if [ -d "backend/tests" ]; then
            pytest backend/tests/ -v --cov=backend --cov-report=xml --cov-report=html
          else
            echo "No tests directory found, skipping tests"
          fi

      # ✅ Upload coverage (optional but safe)
      - name: Upload coverage to Codecov
        if: success() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-report
